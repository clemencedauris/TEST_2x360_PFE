<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="pannellum.css"/>
  <script src="pannellum.js"></script>
  <style>html, body, #panorama { width:100%; height:100vh; margin:0; }</style>
</head>
<body>
  <div id="panorama"></div>
  <script>
    pannellum.viewer('panorama', {
      default: {
        firstScene: 'scene1',
        sceneFadeDuration: 1000
      },
      scenes: {
        scene1: {
          title: 'Atelier',
          panorama: 'Panorama01.png',
          autoLoad: true,
	  hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -10,
              yaw: -82,
              type: 'scene',
              sceneId: 'scene2',
              text: 'Aller pièce 2'
            }
          ]
        },
        scene2: {
          title: 'Lecture',
          panorama: 'Panorama02.png',
          autoLoad: true,
	  hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -11,
              yaw: -92,
              type: 'scene',
              sceneId: 'scene1',
              text: 'Retour pièce 1'
            }
          ]
        }
      }
    });
  </script>
</body>
</html>
